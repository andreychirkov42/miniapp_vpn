<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea257" />
    <title>Romb</title>
    <!-- Никаких внешних ресурсов в <head>: render-blocking запросы к сторонним
         доменам (fonts.googleapis.com, telegram.org) виснут в сетях с DPI и держат
         мини-апп на сером экране в браузерном Telegram. Шрифт — системный fallback. -->
  </head>
  <body>
    <div id="root">
      <!-- Видимый fallback до старта React: если бандл не выполнится, пользователь
           увидит текст, а не серое полотно. React заменит это при первом рендере. -->
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#9fc7b5;text-align:center;background:#0b1f17">
        <div>
          <p style="font-size:15px;margin:0">Загрузка…</p>
          <noscript>Для работы включите JavaScript.</noscript>
        </div>
      </div>
    </div>
    <!-- SDK Telegram хостим у себя: внешний https://telegram.org/js/telegram-web-app.js
         render-blocking и недоступен в сетях с DPI → Mini App виснет на сером экране
         в браузерном Telegram. Локальный same-origin грузится надёжно и покрыт CSP. -->
    <script src="/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
